<!doctype html>
<html lang="te">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>వరి కోత యంత్రం పని గంటల లెక్కింపు</title>
    <style>
      :root {
        --bg: #f8fafc;
        --card: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --border: #cbd5e1;
        --primary: #0f172a;
        --success: #059669;
        --danger: #dc2626;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: var(--text);
        background: var(--bg);
      }
      .page {
        min-height: 100dvh;
        padding:
          max(12px, env(safe-area-inset-top))
          max(12px, env(safe-area-inset-right))
          max(20px, env(safe-area-inset-bottom))
          max(12px, env(safe-area-inset-left));
      }
      .container {
        max-width: 860px;
        margin: 0 auto;
        background: var(--card);
        border-radius: 16px;
        padding: 14px;
        box-shadow: 0 2px 12px rgba(15, 23, 42, 0.08);
      }
      h1 { margin: 0; font-size: 22px; line-height: 1.35; }
      .desc { margin-top: 8px; color: var(--muted); }
      .stack { margin-top: 16px; display: grid; gap: 12px; }
      .session {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        min-width: 0; /* allow grid children to shrink inside narrow cards */
      }
      .session-head {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }
      .title { margin: 0; font-size: 18px; }
      .grid {
        margin-top: 12px;
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 10px;
      }
      label {
        font-size: 14px;
        color: #334155;
        display: block;
        min-width: 0;
      }
      input {
        margin-top: 6px;
        width: 100%;
        max-width: 100%;
        min-width: 0;
        min-height: 46px;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 16px; /* mobile zoom prevent */
      }
      input.input-time {
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.02em;
      }
      .duration { margin-top: 10px; font-size: 14px; color: #334155; }
      .danger { color: var(--danger); }
      .row {
        margin-top: 14px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }
      .panel {
        margin-top: 16px;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
      }
      .amount-box {
        margin-top: 12px;
        background: #ecfdf5;
        color: #065f46;
        border-radius: 10px;
        padding: 12px;
        font-size: 18px;
        font-weight: 600;
      }
      button {
        min-height: 46px;
        border-radius: 10px;
        padding: 10px 14px;
        border: 1px solid transparent;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-primary { background: var(--primary); color: white; }
      .btn-success { background: var(--success); color: white; }
      .btn-outline-danger { background: white; color: var(--danger); border-color: #fecaca; }
      .btn-outline { background: white; color: var(--danger); border-color: #fecaca; font-size: 14px; min-height: 38px; padding: 8px 12px; }
      @media (min-width: 768px) {
        .container { padding: 22px; }
        .grid { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); }
        .row { grid-template-columns: auto auto; justify-content: start; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="container">
        <h1>వరి కోత యంత్రం పని గంటలు & బిల్లు లెక్కింపు</h1>
        <p class="desc">సమయం <strong>సంఖ్యలు మాత్రమే</strong> టైప్ చేయండి — కోలన్ అవసరం లేదు. ఉదా: <code style="font-size:0.95em;">945</code> → 9:45, <code style="font-size:0.95em;">1045</code> → 10:45, <code style="font-size:0.95em;">2145</code> → 9:45 రాత్రి. <code style="font-size:0.95em;">945pm</code> లాంటి రూపం కూడా చేయవచ్చు. <code style="font-size:0.95em;">9:45</code> ఇలా కూడా వ్రాయొచ్చు.</p>

        <div id="sessions" class="stack"></div>

        <div class="row">
          <button id="addSessionBtn" class="btn-primary" type="button">+ కొత్త సెషన్ జోడించు</button>
          <button id="resetBtn" class="btn-outline-danger" type="button">పూర్తి రీసెట్</button>
        </div>

        <div class="panel">
          <h3 style="margin: 0;">మొత్తం లెక్కింపు</h3>
          <p id="totalTime" class="desc" style="margin-top: 8px;">మొత్తం పని సమయం: 0 ని</p>

          <div class="grid" style="margin-top: 10px;">
            <label>
              గంటకు రేటు (రూ)
              <input id="hourlyRate" type="number" min="0" step="0.01" inputmode="decimal" placeholder="ఉదా: 800" />
            </label>
            <div style="display: flex; align-items: end;">
              <button id="calcBtn" class="btn-success" type="button" style="width: 100%;">బిల్లు లెక్కించు</button>
            </div>
          </div>

          <div id="totalAmount" class="amount-box">చెల్లించాల్సిన మొత్తం: —</div>
        </div>
      </section>
    </main>

    <script>
      (function () {
        const STORAGE_KEY = "paddy-hours-calculator-html-v1";
        const sessionsEl = document.getElementById("sessions");
        const totalTimeEl = document.getElementById("totalTime");
        const totalAmountEl = document.getElementById("totalAmount");
        const hourlyRateEl = document.getElementById("hourlyRate");
        const addSessionBtn = document.getElementById("addSessionBtn");
        const resetBtn = document.getElementById("resetBtn");
        const calcBtn = document.getElementById("calcBtn");

        const state = {
          sessions: [],
          hourlyRate: "",
          calculatedAmount: null
        };

        function createSession() {
          return { id: Date.now() + "-" + Math.random().toString(36).slice(2, 8), start: "", end: "" };
        }

        function escapeAttr(str) {
          return String(str)
            .replace(/&/g, "&amp;")
            .replace(/"/g, "&quot;")
            .replace(/</g, "&lt;");
        }

        function clock12To24(h, min, isPm) {
          if (isPm) {
            if (h === 12) return { h: 12, m: min, sec: 0 };
            return { h: h + 12, m: min, sec: 0 };
          }
          if (h === 12) return { h: 0, m: min, sec: 0 };
          return { h, m: min, sec: 0 };
        }

        /**
         * Accepts compact times without colon: 945 → 9:45, 1045 → 10:45, 2145 → 21:45;
         * optional am/pm (e.g. 945pm); also 9:45 and 9:45pm.
         */
        function parseLooseTime(raw) {
          let s = String(raw).trim();
          if (!s) return null;

          let lower = s.toLowerCase().replace(/\s+/g, "");
          let isPm = false;
          let isAm = false;
          if (lower.endsWith("pm")) {
            isPm = true;
            s = s.slice(0, -2).trim();
            lower = lower.slice(0, -2);
          } else if (lower.endsWith("am")) {
            isAm = true;
            s = s.slice(0, -2).trim();
            lower = lower.slice(0, -2);
          } else if (lower.endsWith("p") && lower.length > 1) {
            isPm = true;
            s = s.slice(0, -1).trim();
            lower = lower.slice(0, -1);
          } else if (lower.endsWith("a") && lower.length > 1) {
            isAm = true;
            s = s.slice(0, -1).trim();
            lower = lower.slice(0, -1);
          }

          if (s.includes(":")) {
            const m = s.match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?$/);
            if (!m) return null;
            const h = parseInt(m[1], 10);
            const min = parseInt(m[2], 10);
            const sec = m[3] != null ? parseInt(m[3], 10) : 0;
            if (min > 59 || min < 0 || sec > 59 || sec < 0) return null;
            if (isAm || isPm) {
              if (h < 1 || h > 12) return null;
              return clock12To24(h, min, isPm);
            }
            if (h > 23 || h < 0) return null;
            return { h, m: min, sec };
          }

          const digits = s.replace(/\D/g, "");
          if (!digits) return null;
          if (digits.length > 4) return null;

          if (isAm || isPm) {
            let h, min;
            if (digits.length === 4) {
              h = parseInt(digits.slice(0, 2), 10);
              min = parseInt(digits.slice(2, 4), 10);
            } else if (digits.length === 3) {
              h = parseInt(digits.slice(0, 1), 10);
              min = parseInt(digits.slice(1, 3), 10);
            } else if (digits.length === 2) {
              h = parseInt(digits, 10);
              min = 0;
            } else if (digits.length === 1) {
              h = parseInt(digits, 10);
              min = 0;
            } else return null;
            if (min > 59 || h < 1 || h > 12) return null;
            return clock12To24(h, min, isPm);
          }

          if (digits.length === 4) {
            const h = parseInt(digits.slice(0, 2), 10);
            const min = parseInt(digits.slice(2, 4), 10);
            if (h > 23 || min > 59) return null;
            return { h, m: min, sec: 0 };
          }
          if (digits.length === 3) {
            const h = parseInt(digits.slice(0, 1), 10);
            const min = parseInt(digits.slice(1, 3), 10);
            if (h > 9 || min > 59) return null;
            return { h, m: min, sec: 0 };
          }
          if (digits.length === 2) {
            const h = parseInt(digits, 10);
            if (h > 23) return null;
            return { h, m: 0, sec: 0 };
          }
          if (digits.length === 1) {
            const h = parseInt(digits, 10);
            if (h > 9) return null;
            return { h, m: 0, sec: 0 };
          }
          return null;
        }

        function formatHM24(obj) {
          return String(obj.h).padStart(2, "0") + ":" + String(obj.m).padStart(2, "0");
        }

        /** Empty string, canonical HH:MM, or null if not parseable. */
        function canonicalTimeString(raw) {
          const t = String(raw).trim();
          if (!t) return "";
          const p = parseLooseTime(t);
          if (!p || p.h > 23 || p.m > 59) return null;
          return formatHM24(p);
        }

        function timeToMinutes(value) {
          if (!value) return null;
          const s = String(value).trim();
          if (!s) return null;
          const loose = parseLooseTime(s);
          if (loose) {
            const sec = loose.sec != null ? loose.sec : 0;
            if (loose.h > 23 || loose.h < 0 || loose.m > 59 || loose.m < 0 || sec > 59 || sec < 0) return null;
            return Math.floor(loose.h * 60 + loose.m + sec / 60);
          }
          return null;
        }

        function getSessionMinutes(s) {
          const start = timeToMinutes(s.start);
          const end = timeToMinutes(s.end);
          if (start == null || end == null) return 0;
          if (start === end) return 0;
          if (end > start) return end - start;
          return 24 * 60 - start + end; // overnight
        }

        function formatDuration(totalMinutes) {
          if (!Number.isFinite(totalMinutes) || totalMinutes <= 0) return "0 ని";
          const hrs = Math.floor(totalMinutes / 60);
          const mins = totalMinutes % 60;
          if (hrs <= 0) return mins + " ని";
          if (mins <= 0) return hrs + " గం";
          return hrs + " గం " + mins + " ని";
        }

        function sessionDurationParts(s) {
          const mins = getSessionMinutes(s);
          const startM = timeToMinutes(s.start);
          const endM = timeToMinutes(s.end);
          const same = s.start && s.end && startM != null && endM != null && startM === endM;
          const overnight = s.start && s.end && startM != null && endM != null && endM < startM && mins > 0;
          const html = same
            ? "ప్రారంభం, ముగింపు ఒకే సమయం కాకూడదు."
            : `ఈ సెషన్ సమయం: <strong>${formatDuration(mins)}</strong> (${mins} నిమిషాలు) ${overnight ? "(మరుసటి రోజు వరకు)" : ""}`;
          return { same, html };
        }

        function patchSessionCard(sid) {
          const s = state.sessions.find((x) => x.id === sid);
          if (!s) return;
          const esc = typeof CSS !== "undefined" && CSS.escape ? CSS.escape(sid) : sid.replace(/"/g, '\\"');
          const card = sessionsEl.querySelector(`article.session[data-session-id="${esc}"]`);
          if (!card) return;
          const durEl = card.querySelector(".duration");
          if (!durEl) return;
          const { same, html } = sessionDurationParts(s);
          durEl.className = "duration" + (same ? " danger" : "");
          durEl.innerHTML = html;
        }

        function totalMinutes() {
          return state.sessions.reduce((sum, s) => sum + getSessionMinutes(s), 0);
        }

        function persist() {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function load() {
          try {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return;
            const parsed = JSON.parse(raw);
            if (Array.isArray(parsed.sessions) && parsed.sessions.length) {
              state.sessions = parsed.sessions.map((s) => ({
                id: s.id || createSession().id,
                start: typeof s.start === "string" ? s.start.slice(0, 5) : "",
                end: typeof s.end === "string" ? s.end.slice(0, 5) : ""
              }));
            }
            if (typeof parsed.hourlyRate === "string") state.hourlyRate = parsed.hourlyRate;
            if (typeof parsed.calculatedAmount === "number") state.calculatedAmount = parsed.calculatedAmount;
          } catch (_) {}
        }

        function renderSessions() {
          sessionsEl.innerHTML = "";
          state.sessions.forEach((s, idx) => {
            const { same, html: durHtml } = sessionDurationParts(s);
            const sid = escapeAttr(s.id);

            const wrap = document.createElement("article");
            wrap.className = "session";
            wrap.setAttribute("data-session-id", s.id);
            wrap.innerHTML = `
              <div class="session-head">
                <h2 class="title">సెషన్ ${idx + 1}</h2>
                <button class="btn-outline" type="button" data-remove="${sid}">తొలగించు</button>
              </div>
              <div class="grid">
                <label>
                  ప్రారంభ సమయం
                  <input type="text" class="input-time" maxlength="10" autocomplete="off" spellcheck="false" inputmode="text" placeholder="945 లేదా 1045" title="కోలన్ లేకుండా: 945 (9:45), 2145 (9:45 రాత్రి); లేదా 945pm" value="${escapeAttr(s.start)}" data-start="${sid}" />
                </label>
                <label>
                  ముగింపు సమయం
                  <input type="text" class="input-time" maxlength="10" autocomplete="off" spellcheck="false" inputmode="text" placeholder="1700 లేదా 530pm" title="ఉదా: 1700 (17:00), 530pm (5:30 రాత్రి)" value="${escapeAttr(s.end)}" data-end="${sid}" />
                </label>
              </div>
              <div class="duration${same ? " danger" : ""}">${durHtml}</div>
            `;
            sessionsEl.appendChild(wrap);
          });
        }

        function renderSummary() {
          const mins = totalMinutes();
          totalTimeEl.textContent = `మొత్తం పని సమయం: ${formatDuration(mins)} (${mins} నిమిషాలు)`;
          hourlyRateEl.value = state.hourlyRate;
          totalAmountEl.textContent =
            "చెల్లించాల్సిన మొత్తం: " +
            (state.calculatedAmount == null ? "—" : `₹ ${state.calculatedAmount.toFixed(2)}`);
        }

        function render() {
          renderSessions();
          renderSummary();
          persist();
        }

        sessionsEl.addEventListener("input", function (e) {
          const target = e.target;
          if (!(target instanceof HTMLInputElement)) return;
          const sidStart = target.getAttribute("data-start");
          const sidEnd = target.getAttribute("data-end");
          if (!sidStart && !sidEnd) return;
          const sid = sidStart || sidEnd;
          const s = state.sessions.find((x) => x.id === sid);
          if (!s) return;
          if (sidStart) s.start = target.value || "";
          if (sidEnd) s.end = target.value || "";
          state.calculatedAmount = null;
          persist();
          renderSummary();
          patchSessionCard(sid);
        });

        sessionsEl.addEventListener(
          "focusout",
          function (e) {
            const target = e.target;
            if (!(target instanceof HTMLInputElement)) return;
            const sidStart = target.getAttribute("data-start");
            const sidEnd = target.getAttribute("data-end");
            if (!sidStart && !sidEnd) return;
            const sid = sidStart || sidEnd;
            const s = state.sessions.find((x) => x.id === sid);
            if (!s) return;
            const raw = target.value.trim();
            let next;
            if (!raw) next = "";
            else {
              const can = canonicalTimeString(raw);
              next = can === null ? raw : can;
            }
            if (target.value !== next) target.value = next;
            if (sidStart) s.start = next;
            if (sidEnd) s.end = next;
            state.calculatedAmount = null;
            persist();
            renderSummary();
            patchSessionCard(sid);
          },
          true
        );

        sessionsEl.addEventListener("click", function (e) {
          const target = e.target;
          if (!(target instanceof HTMLElement)) return;
          const sid = target.getAttribute("data-remove");
          if (!sid) return;
          state.sessions = state.sessions.filter((x) => x.id !== sid);
          if (!state.sessions.length) state.sessions = [createSession()];
          state.calculatedAmount = null;
          render();
        });

        addSessionBtn.addEventListener("click", function () {
          state.sessions.push(createSession());
          state.calculatedAmount = null;
          render();
        });

        hourlyRateEl.addEventListener("input", function () {
          state.hourlyRate = hourlyRateEl.value || "";
          state.calculatedAmount = null;
          render();
        });

        calcBtn.addEventListener("click", function () {
          const rate = Number(state.hourlyRate);
          if (!Number.isFinite(rate) || rate < 0) {
            state.calculatedAmount = null;
            render();
            return;
          }
          state.calculatedAmount = Number(((totalMinutes() / 60) * rate).toFixed(2));
          render();
        });

        resetBtn.addEventListener("click", function () {
          state.sessions = [createSession()];
          state.hourlyRate = "";
          state.calculatedAmount = null;
          localStorage.removeItem(STORAGE_KEY);
          render();
        });

        load();
        if (!state.sessions.length) state.sessions = [createSession()];
        render();
      })();
    </script>
  </body>
</html>
