# Plain HTML/JS only — no npm, no React build.
# Site root is paddy-static/; index.html loads at https://<your-domain>/
# To deploy the full Vite app instead, see amplify.yml.vite in this repo.
version: 1
frontend:
  phases:
    build:
      commands:
        - echo "Static site — no build step"
  artifacts:
    baseDirectory: paddy-static
    files:
      - "**/*"
